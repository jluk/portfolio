<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 60px 60px;
            color: #fff;
            gap: 24px;
        }
        .phase {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }
        .phase-tag {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 6px 18px;
            border-radius: 24px;
        }
        .tag-now { background: #1e3a5f; color: #93c5fd; }
        .tag-next { background: #1a2e1a; color: #34d399; }
        .tag-future { background: #2d1b4e; color: #c084fc; }

        .phase-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            line-height: 1.15;
        }
        .phase-visual {
            width: 240px;
            height: 240px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Single agent */
        .single-agent {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 0 50px rgba(37, 99, 235, 0.4);
        }
        .single-orbit {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2.5px dashed #333;
            border-radius: 50%;
        }

        /* Multi agent */
        .swarm-agent {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .sa1 { top: 15%; left: 25%; background: linear-gradient(135deg, #2563eb, #3b82f6); box-shadow: 0 0 24px rgba(37, 99, 235, 0.3); }
        .sa2 { top: 10%; left: 60%; background: linear-gradient(135deg, #7c3aed, #8b5cf6); box-shadow: 0 0 24px rgba(124, 58, 237, 0.3); }
        .sa3 { top: 48%; left: 15%; background: linear-gradient(135deg, #059669, #34d399); box-shadow: 0 0 24px rgba(52, 211, 153, 0.3); }
        .sa4 { top: 45%; left: 62%; background: linear-gradient(135deg, #dc2626, #f87171); box-shadow: 0 0 24px rgba(220, 38, 38, 0.3); }
        .sa5 { top: 72%; left: 42%; background: linear-gradient(135deg, #d97706, #fbbf24); box-shadow: 0 0 24px rgba(217, 119, 6, 0.3); }
        .swarm-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #444, transparent);
            transform-origin: left center;
        }
        .sl1 { top: 33%; left: 38%; width: 55px; transform: rotate(12deg); }
        .sl2 { top: 58%; left: 30%; width: 65px; transform: rotate(-20deg); }
        .sl3 { top: 60%; left: 55%; width: 45px; transform: rotate(35deg); }

        /* Lab grid */
        .lab-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            width: 190px;
            height: 190px;
        }
        .lab-cell {
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 1.5px solid #333;
            background: #111;
        }
        .lab-cell.active {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
            box-shadow: 0 0 16px rgba(124, 58, 237, 0.2);
        }
        .lab-cell.idle {
            border-color: #222;
            opacity: 0.3;
        }

        .arrow-div {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            flex-shrink: 0;
        }
        .arrow-icon {
            font-size: 36px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="phase">
        <div class="phase-tag tag-now">Today</div>
        <div class="phase-title">Single Agent</div>
        <div class="phase-visual">
            <div class="single-orbit"></div>
            <div class="single-agent">🤖</div>
        </div>
    </div>

    <div class="arrow-div">
        <span class="arrow-icon">→</span>
    </div>

    <div class="phase">
        <div class="phase-tag tag-next">Next</div>
        <div class="phase-title">Agent Swarm</div>
        <div class="phase-visual">
            <div class="swarm-line sl1"></div>
            <div class="swarm-line sl2"></div>
            <div class="swarm-line sl3"></div>
            <div class="swarm-agent sa1">🤖</div>
            <div class="swarm-agent sa2">🤖</div>
            <div class="swarm-agent sa3">🤖</div>
            <div class="swarm-agent sa4">🤖</div>
            <div class="swarm-agent sa5">🤖</div>
        </div>
    </div>

    <div class="arrow-div">
        <span class="arrow-icon">→</span>
    </div>

    <div class="phase">
        <div class="phase-tag tag-future">Future</div>
        <div class="phase-title">Research Lab</div>
        <div class="phase-visual">
            <div class="lab-grid">
                <div class="lab-cell active">🤖</div>
                <div class="lab-cell active">🤖</div>
                <div class="lab-cell idle">·</div>
                <div class="lab-cell idle">·</div>
                <div class="lab-cell active">🤖</div>
                <div class="lab-cell active">🤖</div>
                <div class="lab-cell active">🤖</div>
                <div class="lab-cell idle">·</div>
                <div class="lab-cell active">🤖</div>
            </div>
        </div>
    </div>
</body>
</html>
